name: Build CV PDF

# Rebuild yaroslav_barov.pdf whenever README.md (or the template) changes on master,
# then commit the regenerated PDF back to master.
on:
  push:
    branches: [main]
    paths:
      - README.md
      - latex_header.tex
      - .github/workflows/build-pdf.yml

# Allow the workflow to push the regenerated PDF back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing to push to master.
concurrency:
  group: build-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc, XeLaTeX and fonts
        run: |
          set -eux
          # Accept the MS Core Fonts EULA non-interactively (provides Verdana + Arial).
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" \
            | sudo debconf-set-selections
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            fonts-dejavu-core \
            ttf-mscorefonts-installer \
            fontconfig

      - name: Build PDF
        run: |
          set -eux
          # The template's \setmonofont{Menlo} is a macOS-only font. fontspec
          # refuses fontconfig substitutes and errors if the exact family is
          # missing, so swap it for an available mono font in a build-only copy
          # of the template (the committed latex_header.tex stays unchanged).
          sed 's/\\setmonofont{Menlo}/\\setmonofont{DejaVu Sans Mono}/' \
            latex_header.tex > .ci_header.tex
          pandoc README.md \
            --pdf-engine=xelatex \
            --template=.ci_header.tex \
            -o yaroslav_barov.pdf

      - name: Commit regenerated PDF
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- yaroslav_barov.pdf; then
            echo "PDF unchanged, nothing to commit."
            exit 0
          fi
          git add yaroslav_barov.pdf
          git commit -m "chore: rebuild yaroslav_barov.pdf [skip ci]"
          git push
